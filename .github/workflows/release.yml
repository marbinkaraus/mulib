# Build macOS installers when you push a version tag (e.g. v0.2.0).
# Prerequisite: tag the commit after bumping version in package.json / tauri.conf.json / Cargo.toml if you keep them in sync.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Rust stable + ${{ matrix.target }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
          shared-key: release-${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (${{ matrix.target }})
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Collect DMG
        run: |
          set -euo pipefail
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          DMG=$(find "$DMG_DIR" -maxdepth 1 -name "*.dmg" | head -1)
          if [ -z "$DMG" ] || [ ! -f "$DMG" ]; then
            echo "No .dmg found under $DMG_DIR"
            ls -la "$DMG_DIR" || true
            exit 1
          fi
          mkdir -p upload
          cp "$DMG" "upload/Mulib_${{ matrix.target }}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.target }}
          path: upload/Mulib_${{ matrix.target }}.dmg

  publish:
    needs: build-mac
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dmg-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
